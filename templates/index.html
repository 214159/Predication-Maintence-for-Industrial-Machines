<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel AI | Machine Health</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; }
        .view { display: none; min-height: 100vh; }
        .view.active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glass-container { 
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(30, 41, 59, 0.8) 100%); 
            border: 1px solid rgba(99, 102, 241, 0.1); 
            backdrop-filter: blur(20px); 
        }
        .input-box { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: #6366f1; background: #0f172a; }
    </style>
</head>
<body>

    <section id="welcomePage" class="view active items-center justify-center bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-indigo-900/40 via-slate-950 to-slate-950">
        <div class="text-center space-y-8">
            <h1 class="text-7xl md:text-8xl font-black tracking-tighter uppercase italic">MACHINE<br><span class="text-indigo-500">SENTINEL</span></h1>
            <p class="text-slate-400 text-lg uppercase tracking-widest">Predictive Maintenance Engine v3.0</p>
            <button onclick="changeView('entryPage')" class="bg-indigo-600 hover:bg-indigo-500 text-white font-black px-12 py-5 rounded-2xl transition-all hover:scale-105">BEGIN SENSOR SCAN</button>
        </div>
    </section>

    <section id="entryPage" class="view bg-slate-950 p-6">
        <div class="max-w-4xl mx-auto w-full glass-container rounded-[2.5rem] overflow-hidden flex flex-col">
            <div class="p-6 border-b border-white/5 bg-white/5 flex justify-between items-center">
                <h2 class="text-sm font-bold uppercase tracking-[0.3em] text-indigo-400">Parameter Ingestion</h2>
                <div id="loadingStatus" class="hidden text-xs text-indigo-400 animate-pulse font-bold">ANALYZING SENSORS...</div>
            </div>

            <form id="sensorForm" class="p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Machine Quality Grade</label>
                    <select name="machine_quality" class="input-box">
                        <option value="Low">Low Grade (L)</option>
                        <option value="Medium" selected>Medium Grade (M)</option>
                        <option value="High">High Grade (H)</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Ambient Air Temperature (K)</label>
                    <input type="number" step="0.1" name="air_t" class="input-box" placeholder="e.g. 298.1" required>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Process Temperature (K)</label>
                    <input type="number" step="0.1" name="proc_t" class="input-box" placeholder="e.g. 308.6" required>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Spindle Speed (RPM)</label>
                    <input type="number" name="rpm" class="input-box" placeholder="e.g. 1550" required>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Motor Torque (Nm)</label>
                    <input type="number" step="0.1" name="torque" class="input-box" placeholder="e.g. 42.8" required>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Tool Usage Duration (min)</label>
                    <input type="number" name="wear" class="input-box" placeholder="e.g. 180" required>
                </div>
            </form>

            <div class="p-6 bg-slate-900/50 flex justify-end">
                <button onclick="runDiagnostic()" class="bg-indigo-600 hover:bg-indigo-500 px-12 py-4 rounded-xl font-bold transition-all uppercase text-sm tracking-widest">Run Diagnostic</button>
            </div>
        </div>
    </section>

    <section id="analyzePage" class="view bg-slate-950 p-6 overflow-y-auto">
        <div class="max-w-6xl mx-auto w-full space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="glass-container p-8 rounded-[2.5rem] text-center">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-6">Health Diagnostic</p>
                    <div class="relative w-48 h-48 mx-auto">
                        <canvas id="healthChart"></canvas>
                        <div id="timeVal" class="absolute inset-0 flex items-center justify-center text-xl font-black text-indigo-400 px-6">...</div>
                    </div>
                    <h3 id="statusLabel" class="text-2xl font-black uppercase italic mt-6 text-emerald-500">System Healthy</h3>
                </div>

                <div class="lg:col-span-2 glass-container p-8 rounded-[2.5rem]">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-6 text-indigo-400">Critical Failure Factors</p>
                    <div class="h-64"><canvas id="impactChart"></canvas></div>
                </div>
            </div>

            <div class="glass-container p-8 rounded-[2.5rem]">
                <h4 class="text-sm font-bold uppercase tracking-widest text-indigo-400 mb-6"><i class="fas fa-robot mr-2"></i> AI Maintenance Strategy</h4>
                <div id="adviceGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div class="flex justify-center pb-10">
                <button onclick="location.reload()" class="bg-slate-800 px-12 py-4 rounded-xl font-bold uppercase text-xs tracking-widest">Restart Scan</button>
            </div>
        </div>
    </section>

    <script>
        function changeView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function runDiagnostic() {
            const form = document.getElementById('sensorForm');
            const formData = new FormData(form);
            const jsonData = Object.fromEntries(formData.entries());
            document.getElementById('loadingStatus').classList.remove('hidden');

            try {
                const response = await fetch('/predict', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(jsonData) 
                });
                const result = await response.json();

                // Update UI
                document.getElementById('statusLabel').innerText = result.status.replace('_', ' ');
                document.getElementById('timeVal').innerText = result.time;
                document.getElementById('statusLabel').className = result.status === "No_Failure" ? "text-2xl font-black uppercase italic mt-6 text-emerald-500" : "text-2xl font-black uppercase italic mt-6 text-red-500";

                changeView('analyzePage');
                renderHealth(result.status === "No_Failure" ? 100 : 30);
                renderImpacts(result.top_impacts);

                const adviceDiv = document.getElementById('adviceGrid');
                adviceDiv.innerHTML = '';
                result.recovery_steps.forEach(s => {
                    adviceDiv.innerHTML += `<div class="bg-slate-900/80 p-4 rounded-xl border border-white/5 text-sm text-slate-300">${s}</div>`;
                });

            } catch (e) { alert("Connection Error"); }
            finally { document.getElementById('loadingStatus').classList.add('hidden'); }
        }

        function renderHealth(val) {
            const ctx = document.getElementById('healthChart');
            if (window.hC) window.hC.destroy();
            window.hC = new Chart(ctx, {
                type: 'doughnut',
                data: { datasets: [{ data: [val, 100-val], backgroundColor: ['#6366f1', '#1e293b'], borderWidth: 0 }] },
                options: { cutout: '85%', plugins: { legend: { display: false } } }
            });
        }

        function renderImpacts(labels) {
            const ctx = document.getElementById('impactChart');
            if (window.iC) window.iC.destroy();
            window.iC = new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: [{ data: [95, 75], backgroundColor: '#6366f1', borderRadius: 8 }] },
                options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { ticks: { color: 'white', font: { weight: 'bold' } } } } }
            });
        }
    </script>
</body>
</html>
